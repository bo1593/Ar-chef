<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شيف الـ 3D الذكي - المنيو</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        /* تصميم واجهة المستخدم اللي هتظهر فوق الـ AR */
        #ui-overlay {
            position: absolute; bottom: 20px; left: 0; right: 0;
            text-align: center; color: white;
            z-index: 1000;
        }
        #order-btn {
            background-color: #ffcc00; color: #333;
            border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: bold;
            font-size: 1.1em; display: none; /* هيظهر لما الموديل يتحمل */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        #description { display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <button id="order-btn" onclick="orderFood()">اطلب "روبوت سالمون"</button>
        <div id="description">
            <p><strong>شيف آلي:</strong> "أهلاً بيك! الطبق ده مكون من سالمون طازج وخضروات موسمية. خيار صحي وفاجر!"</p>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <a-asset-item id="shifu-model" src="https://cdn.aframe.io/models/avocado/avocado.glb"></a-assets-item>
        </a-assets>

        <a-marker-camera preset="hiro">
            
            <a-entity id="shifu-avatar" 
                      gltf-model="#shifu-model" 
                      scale="10 10 10" 
                      position="0 0.5 0" 
                      rotation="0 -90 0"
                      animation__rotate="property: rotation; to: 0 270 0; dur: 5000; easing: linear; loop: true">
            </a-entity>

            <a-entity light="type: hemisphere; color: white; diffuse: #444; intensity: 1.5" position="0 2 0"></a-entity>
        </a-marker-camera>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // إظهار زر الطلب بعد ما الـ AR يتحمل
        document.querySelector('a-scene').addEventListener('arjs-initialized', function() {
            document.getElementById('order-btn').style.display = 'inline-block';
            console.log("AR Initialized!");
        });

        function orderFood() {
            document.getElementById('description').style.display = 'block';
            document.getElementById('order-btn').innerHTML = "تم إضافة السالمون للطلب!";
            document.getElementById('order-btn').style.backgroundColor = '#99ff99';
            // هنا ممكن نربط بالـ Firebase عشان يسجل الطلب
        }
    </script>
</body>
</html>
